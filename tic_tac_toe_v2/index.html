<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <h1>TIC TAC TOE</h1>
        <button class="toggle" id="toggle">DARK</button>
    </header>

    <div class="scoreboard">
        <div class="score-card player">
            <div class="score-label">YOU</div>
            <div class="score-value" id="p-score">0</div>
        </div>
        <div class="score-card round">
            <div class="score-label">ROUND</div>
            <div class="score-value" id="round">1</div>
        </div>
        <div class="score-card algo">
            <div class="score-label">ALGO</div>
            <div class="score-value" id="a-score">0</div>
        </div>
    </div>

    <div class="status" id="status">YOUR TURN</div>

    <div class="board" id="board">
        <div class="cell" data-i="0"></div>
        <div class="cell" data-i="1"></div>
        <div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div>
        <div class="cell" data-i="4"></div>
        <div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div>
        <div class="cell" data-i="7"></div>
        <div class="cell" data-i="8"></div>
    </div>

    <div class="actions">
        <button class="btn" id="end-btn">END GAME</button>
        <button class="btn primary" id="next-btn">NEXT ROUND</button>
    </div>

    <!-- result overlay -->
    <div class="overlay" id="overlay">
        <div class="modal">
            <h2 id="modal-title"></h2>
            <p id="modal-body"></p>
            <button class="btn primary" id="modal-close">PLAY AGAIN</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
